# ============================================================
#  ML-Based Systematic Trading — Publication-Grade Pipeline
#  SINGLE SOURCE OF TRUTH — All parameters live here.
# ============================================================

data:
  tickers:
    etfs: [SPY, QQQ, IWM, DIA]
    stocks: [AAPL, MSFT, GOOGL, NVDA, AMZN,
             JPM, BAC, GS, WFC,
             JNJ, UNH, PFE,
             XOM, CVX,
             WMT, PG, KO, HD,
             DIS, NFLX, CMCSA, BA, CAT]
  source: yahoo_finance
  frequency: daily
  cache_dir: ./data/cache/

periods:
  phase_a:
    start: "2010-01-01"
    end: "2013-12-31"
  phase_b:
    start: "2014-01-01"
    end: "2022-12-31"
  phase_c:
    start: "2023-01-01"
    end: "2023-12-31"

features:
  return_lags: [1, 2, 3]
  volatility_windows: [5, 20]
  atr_window: 14
  volume_z_window: 20

labeling:
  horizons: [3, 5, 7, 10, 15, 20]
  strategies:
    - name: directional_binary
      threshold_mult: 0.0
      vol_window: 20
    - name: multiclass_volatility
      threshold_mult: 0.5
      vol_window: 20

models:
  lightgbm:
    learning_rate: 0.05
    n_estimators: 400
    max_depth: 3
    num_leaves: 8
    min_child_samples: 200
    subsample: 0.7
    colsample_bytree: 0.7
    reg_alpha: 1.0
    reg_lambda: 5.0
  xgboost:
    learning_rate: 0.05
    n_estimators: 400
    max_depth: 6
    min_child_weight: 5
    subsample: 0.7
    colsample_bytree: 0.7
    reg_alpha: 1.0
    reg_lambda: 5.0
  logistic_regression:
    penalty: l2
    C: 1.0
    solver: lbfgs
    max_iter: 1000

search_space:
  horizons: [3, 5, 7, 10, 15, 20]
  label_modes: [directional_binary, multiclass_volatility]
  model_types: [lightgbm, xgboost, logistic_regression]
  tree_depths: [3, 6]
  seeds: [42, 123, 456, 789, 2024]

splitting:
  embargo_days: 25
  phase_a:
    train_ratio: 0.70
    n_sub_periods: 3
  phase_b:
    windows:
      - train_start: "2014-01-01"
        train_end: "2016-12-31"
        test_start: "2017-01-01"
        test_end: "2017-12-31"
      - train_start: "2014-01-01"
        train_end: "2017-12-31"
        test_start: "2018-01-01"
        test_end: "2018-12-31"
      - train_start: "2014-01-01"
        train_end: "2018-12-31"
        test_start: "2019-01-01"
        test_end: "2019-12-31"
      - train_start: "2014-01-01"
        train_end: "2019-12-31"
        test_start: "2020-01-01"
        test_end: "2020-12-31"
      - train_start: "2014-01-01"
        train_end: "2020-12-31"
        test_start: "2021-01-01"
        test_end: "2021-12-31"
      - train_start: "2014-01-01"
        train_end: "2021-12-31"
        test_start: "2022-01-01"
        test_end: "2022-12-31"

scs_a:
  weights:
    S_time: 0.25
    S_asset: 0.25
    S_model: 0.25
    S_seed: 0.15
    S_dist: 0.10
  threshold: 0.70
  hard_gates:
    min_global_sharpe: 0.0
    min_positive_ratio: 0.50
    min_trades_per_bucket: 8

scs_b:
  weights:
    S_time: 0.25
    S_asset: 0.25
    S_cost: 0.20
    S_struct: 0.15
    S_eco: 0.15
  threshold: 0.60
  cost_scenarios:
    baseline_bps: 5
    stress_bps: 10

phase_c:
  initial_capital: 100000
  horizon: 10
  max_positions: 15
  capital_per_trade_pct: 10.0
  max_exposure_per_ticker_pct: 12.0
  transaction_cost_bps: 5.0
  take_profit_pct: 8.0
  stop_loss_pct: 5.0
  allow_short: true
  selection_method: top_proba
  min_proba_long: 0.55
  min_proba_short: 0.55

statistics:
  bootstrap:
    n_samples: 10000
    confidence_level: 0.95
  permutation_test:
    n_permutations: 1000
  deflated_sharpe:
    n_trials: 12
  cost_sensitivity:
    bps_range: [0, 2, 5, 10, 20, 50]
